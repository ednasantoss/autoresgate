<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - Oficina</title>
    <link rel="stylesheet" href="../css/cadastro-cliente.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Criar Conta</h2>
                <p>Preencha os campos abaixo para se cadastrar na plataforma.</p>
            </div>

            <form id="formCadastroCliente" class="auth-form">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seu.email@exemplo.com">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" required placeholder="(11) 99999-9999">
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Crie uma senha segura">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Finalizar Cadastro</button>
            </form>

            <div class="auth-footer">
                <p>Já tem uma conta? <a href="login-cliente.html">Fazer Login</a></p>
                <p><a href="../../index.html" class="back-link">← Voltar para a Home</a></p>
            </div>
        </div>
    </div>

    <script src="../js/cadastro-cliente.js"></script>
</body>

</html>
